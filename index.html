<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دردشة حية فخمة</title>
    <style>
        /* تنسيقات الواجهة الفخمة */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .chat-container {
            width: 90%;
            max-width: 400px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: #764ba2;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2em;
        }

        #chat-box {
            height: 400px;
            padding: 15px;
            overflow-y: auto;
            background: #f7f7f7;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 80%;
            word-wrap: break-word;
            font-size: 0.9em;
        }

        .sent {
            background: #764ba2;
            color: white;
            align-self: flex-start; /* لليمين لأن الاتجاه RTL */
            border-bottom-right-radius: 2px;
        }

        .chat-input-area {
            display: flex;
            padding: 15px;
            background: white;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
        }

        button {
            background: #764ba2;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a3a7e;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">غرفة الدردشة الحية ⚡</div>
    <div id="chat-box">
        <!-- الرسائل ستظهر هنا -->
    </div>
    <div class="chat-input-area">
        <input type="text" id="user-input" placeholder="اكتب رسالتك هنا...">
        <button id="send-btn">إرسال</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
